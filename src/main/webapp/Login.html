<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login Form</title>
<script src="formvalidation.js"></script>
<style>
  body {
    background-color:lightseagreen; 
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
  }

  .login-box {
    background-color:white;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
  }

  .login-box h2 {
    margin-top: 0;
    text-align: center;
    font-weight: bold;
    color: #fff;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 16px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 10px;
    background-color: #00695c;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }

  button:hover {
    background-color: #004d40;
  }
  
  a {
    display: block;
    text-align: center;
    margin-top: 8px;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
  }

  a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

<div class="login-box">
  <h2 style="color: black;">Login</h2>
  <form onclick="ValidityLogin()">
    <input type="text" style="font-weight: bold;" id="loginsic" placeholder="SIC" required />
    <input type="password" style="font-weight:600 ;" id="loginpass" placeholder="PASSWORD" required />
    <button type="submit">Log In</button>
  </form>
  <span style="display: inline;">Create New Account <a href="signup.html" style="color: blue;">Sign Up</a></span>
</div>
</body>
</html>
