<%@ page language="java" contentType="text/html; charset=UTF-8"
    pageEncoding="UTF-8"%>

<%
    if(session == null || session.getAttribute("sic") == null){
        response.sendRedirect(request.getContextPath() + "/login.html");
        return;
    }
%>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost and Found</title>

<style>
/* KEEP YOUR CSS SAME */
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: #f4f7fb; color: #222; }
/* rest same */
</style>

</head>

<body>

<section id="lostFoundPage">
  <div class="container">

    <!-- TOP BAR -->
    <div class="topbar">
      <h2>Lost and Found System</h2>

      <!-- 🔥 FIXED BUTTON -->
      <button class="action-button secondary-button"
        onclick="window.location.href='<%= request.getContextPath() %>/dashboard.jsp'">
        Back to Dashboard
      </button>
    </div>

    <!-- FORM -->
    <div class="card">
      <h3>Add Item</h3>

      <input id="itemName" type="text" placeholder="Item Name" />
      <input id="personName" type="text" placeholder="Name" />
      <input id="itemSic" type="text" placeholder="SIC No." />
      <textarea id="itemDescription" placeholder="Description"></textarea>

      <select id="itemStatus">
        <option value="lost">Lost</option>
        <option value="found">Found</option>
      </select>

      <input id="contactDetails" type="text" placeholder="Contact Details" />

      <button onclick="addItem()">Submit Item</button>
    </div>

    <!-- LIST -->
    <div class="card">
      <h3>Items</h3>
      <div id="itemsContainer"></div>
    </div>

  </div>
</section>

<script>
/* KEEP YOUR JS SAME */
let items = [];

function addItem() {
  const itemName = document.getElementById("itemName").value;
  const personName = document.getElementById("personName").value;
  const sic = document.getElementById("itemSic").value;
  const description = document.getElementById("itemDescription").value;

  if (!itemName || !personName || !sic || !description) {
    alert("Fill all fields");
    return;
  }

  items.push({ itemName, personName, sic, description });

  renderItems();
}

function renderItems() {
  const container = document.getElementById("itemsContainer");
  container.innerHTML = "";

  items.forEach(i => {
    container.innerHTML += `
      <div style="padding:10px; border:1px solid #ccc; margin:10px;">
        <b>${i.itemName}</b><br>
        ${i.description}<br>
        <small>${i.personName} (${i.sic})</small>
      </div>
    `;
  });
}
</script>

</body>
</html>
