<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lost and Found System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #222;
    }

    #lostFoundPage {
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .topbar {
      background: #0f172a;
      color: white;
      padding: 15px 20px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .topbar h2 {
      font-size: 24px;
    }

    .action-button {
      width: auto;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .action-button:hover {
      background: #1d4ed8;
    }

    .secondary-button {
      background: #6b7280;
    }

    .secondary-button:hover {
      background: #4b5563;
    }

    .danger-button {
      background: #dc2626;
    }

    .danger-button:hover {
      background: #b91c1c;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .stat-box {
      background: white;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      cursor: pointer;
      text-align: center;
    }

    .stat-box h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    .stat-box p {
      font-size: 28px;
      font-weight: bold;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .section-title {
      margin-bottom: 15px;
      font-size: 20px;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 12px;
      margin: 8px 0 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      background: white;
    }

    .form-textarea {
      resize: vertical;
      min-height: 90px;
    }

    .file-label {
      display: block;
      margin-top: 8px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
    }

    .media-preview {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .media-preview img,
    .media-preview video {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .item-card {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 15px;
      background: #fafafa;
    }

    .item-name {
      margin-bottom: 8px;
    }

    .item-meta {
      font-size: 14px;
      margin-bottom: 10px;
      color: #444;
      line-height: 1.6;
    }

    .status-tag {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 13px;
      color: white;
      margin-right: 8px;
    }

    .lost {
      background: #dc2626;
    }

    .found {
      background: #16a34a;
    }

    .item-media {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .item-media img,
    .item-media video {
      width: 160px;
      height: 110px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .item-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .small-button {
      width: auto;
      padding: 8px 14px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <section id="lostFoundPage">
    <div class="container">
      <div class="topbar">
        <h2>Lost and Found System</h2>
        <button class="action-button secondary-button" onclick="window.location.href='<%= request.getContextPath() %>/dashboard.jsp'">Back to Dashboard</button>
      </div>

      <div class="stats">
        <div class="stat-box" onclick="filterItems('all')">
          <h3>Total Items</h3>
          <p id="totalCount">0</p>
        </div>
        <div class="stat-box" onclick="filterItems('lost')">
          <h3>Lost Items</h3>
          <p id="lostCount">0</p>
        </div>
        <div class="stat-box" onclick="filterItems('found')">
          <h3>Found Items</h3>
          <p id="foundCount">0</p>
        </div>
      </div>

      <div class="card">
        <h3 class="section-title">Add Item</h3>
        <input id="itemName" class="form-input" type="text" placeholder="Item Name" />
        <input id="personName" class="form-input" type="text" placeholder="Name" />
        <input id="itemSic" class="form-input" type="text" placeholder="SIC No." />
        <textarea id="itemDescription" class="form-textarea" placeholder="Item Description"></textarea>
        <select id="itemStatus" class="form-select">
          <option value="lost">Lost</option>
          <option value="found">Found</option>
        </select>
        <input id="contactDetails" class="form-input" type="text" placeholder="Contact Details" />
        <label for="itemMedia" class="file-label">Upload Images / Videos</label>
        <input id="itemMedia" class="form-input" type="file" accept="image/*,video/*" multiple />
        <div id="mediaPreview" class="media-preview"></div>
        <button class="action-button" onclick="addItem()">Submit Item</button>
      </div>

      <div class="card">
        <h3 class="section-title">Items</h3>
        <div id="itemsContainer" class="items-list"></div>
      </div>
    </div>
  </section>

  <script>
    let items = [];
    let currentFilter = "all";
    let editIndex = -1;
    let selectedFiles = [];

    document.getElementById("itemMedia").addEventListener("change", function (e) {
      selectedFiles = Array.from(e.target.files);
      previewFiles(selectedFiles);
    });

    function previewFiles(files) {
      const preview = document.getElementById("mediaPreview");
      preview.innerHTML = "";
      files.forEach(file => {
        const url = URL.createObjectURL(file);
        if (file.type.startsWith("image/")) preview.innerHTML += `<img src="${url}" alt="preview">`;
        else if (file.type.startsWith("video/")) preview.innerHTML += `<video src="${url}" controls></video>`;
      });
    }

    function addItem() {
      const itemName = document.getElementById("itemName").value.trim();
      const personName = document.getElementById("personName").value.trim();
      const sic = document.getElementById("itemSic").value.trim();
      const description = document.getElementById("itemDescription").value.trim();
      const status = document.getElementById("itemStatus").value;
      const contact = document.getElementById("contactDetails").value.trim();

      if (!itemName || !personName || !sic || !description || !contact) {
        alert("Please fill all item fields.");
        return;
      }

      const mediaData = selectedFiles.map(file => ({
        type: file.type,
        url: URL.createObjectURL(file)
      }));

      if (editIndex === -1) {
        items.push({ itemName, personName, sic, description, status, contact, media: mediaData });
      } else {
        items[editIndex] = { itemName, personName, sic, description, status, contact, media: mediaData };
        editIndex = -1;
      }

      clearForm();
      renderItems();
    }

    function clearForm() {
      document.getElementById("itemName").value = "";
      document.getElementById("personName").value = "";
      document.getElementById("itemSic").value = "";
      document.getElementById("itemDescription").value = "";
      document.getElementById("itemStatus").value = "lost";
      document.getElementById("contactDetails").value = "";
      document.getElementById("itemMedia").value = "";
      document.getElementById("mediaPreview").innerHTML = "";
      selectedFiles = [];
    }

    function renderItems() {
      const container = document.getElementById("itemsContainer");
      container.innerHTML = "";

      let filtered = items;
      if (currentFilter !== "all") filtered = items.filter(i => i.status === currentFilter);

      filtered.forEach(i => {
        const realIndex = items.indexOf(i);
        let mediaHTML = "";

        if (i.media && i.media.length > 0) {
          mediaHTML = `<div class="item-media">`;
          i.media.forEach(m => {
            if (m.type.startsWith("image/")) mediaHTML += `<img src="${m.url}" alt="item image">`;
            else if (m.type.startsWith("video/")) mediaHTML += `<video src="${m.url}" controls></video>`;
          });
          mediaHTML += `</div>`;
        }

        container.innerHTML += `
          <div class="item-card">
            <h4 class="item-name">${i.itemName}</h4>
            <div class="item-meta">
              <strong>Name:</strong> ${i.personName} <br>
              <strong>SIC No.:</strong> ${i.sic} <br>
              <strong>Description:</strong> ${i.description} <br>
              <strong>Contact Details:</strong> ${i.contact}
            </div>
            <span class="status-tag ${i.status}">${i.status.toUpperCase()}</span>
            ${mediaHTML}
            <div class="item-actions">
              <button class="action-button secondary-button small-button" onclick="editItem(${realIndex})">Edit</button>
              <button class="action-button danger-button small-button" onclick="deleteItem(${realIndex})">Delete</button>
            </div>
          </div>
        `;
      });

      updateCounts();
    }

    function editItem(index) {
      const i = items[index];
      document.getElementById("itemName").value = i.itemName;
      document.getElementById("personName").value = i.personName;
      document.getElementById("itemSic").value = i.sic;
      document.getElementById("itemDescription").value = i.description;
      document.getElementById("itemStatus").value = i.status;
      document.getElementById("contactDetails").value = i.contact;
      editIndex = index;
    }

    function deleteItem(index) {
      items.splice(index, 1);
      if (editIndex === index) editIndex = -1;
      renderItems();
    }

    function updateCounts() {
      document.getElementById("totalCount").textContent = items.length;
      document.getElementById("lostCount").textContent = items.filter(i => i.status === "lost").length;
      document.getElementById("foundCount").textContent = items.filter(i => i.status === "found").length;
    }

    function filterItems(type) {
      currentFilter = type;
      renderItems();
    }

    renderItems();
  </script>
</body>
</html>
