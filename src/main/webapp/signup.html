<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Smart Campus</title>
<style>
  /* Background with a softer gradient */
  body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    padding: 0;
  }

  @keyframes gradientShift {
    0% {
      background-position: 0% 50%;
    }
    50% {
      background-position: 100% 50%;
    }
    100% {
      background-position: 0% 50%;
    }
  }

  /* Main card container */
  .container {
    background: white;
    padding: 40px 30px;
    border-radius: 16px;
    width: 360px;
    max-width: 90vw;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(0, 0, 0, 0.05);
  }

  /* Header */
  h2 {
    color: #1e3c72;
    font-size: 24px;
    font-weight: 600;
    margin-bottom: 10px;
    text-align: center;
  }

  /* Subtitle */
  p.description {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 25px;
  }

  /* Inputs styling */
  input {
    width: 100%;
    padding: 12px 14px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    box-sizing: border-box;
    font-size: 14px;
    transition: all 0.2s ease;
  }

  input:focus {
    outline: none;
    border-color: #00c896;
    box-shadow: 0 0 0 2px rgba(0, 200, 150, 0.2);
  }

  /* Button */
  button {
    width: 100%;
    padding: 12px;
    background: #00c896;
    border: none;
    color: white;
    font-size: 16px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s ease;
  }

  button:hover {
    background: #00a87a;
    transform: translateY(-1px);
    box-shadow: 0 5px 12px rgba(0, 168, 122, 0.3);
  }

  /* Link text */
  p {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
  }

  a {
    color: #007bff;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s ease;
  }

  a:hover {
    color: #0056b3;
    text-decoration: underline;
  }

  /* Accent decoration (optional) */
  .container::before {
    content: "";
    position: absolute;
    top: -10%;
    right: -10%;
    width: 60%;
    height: 60%;
    background: radial-gradient(circle, rgba(0, 198, 150, 0.2), rgba(0, 198, 150, 0) 70%);
    border-radius: 50%;
    z-index: -1;
  }

  /* Responsive text alignment on small screens */
  @media (max-width: 400px) {
    .container {
      width: 95%;
      padding: 30px 20px;
    }
  }
</style>

</head>
<body>
<div class="container">
<h2>Create Account</h2>
<form onsubmit="ValidateSignup()">
<input type="text" placeholder="Full Name" id="name"  required>
<input type="text" placeholder="SIC Number" id="sic" required>
<input type="password" placeholder="Create Password" id="curpass" required>
<input type="password" placeholder="Confirm Password" id="pass" required>
<button type="submit">Sign Up</button>
</form>
<p>Already have an account? <a href="login.html">Login</a></p>
</div>
</body>
</html>
