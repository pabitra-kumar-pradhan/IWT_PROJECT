<!DOCTYPE html>
<html>
<head>
<title>Smart Campus Solution</title>
<link rel="stylesheet">
</head>
<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f6f8;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
}
.hero{
display:flex;
align-items:center;
padding:50px;
}
.left{
width:50%;
}
.left h1{
font-size:45px;
}
.left span{
color:#2a6fd6;
}
.left p{
color:#555;
line-height:1.6;
margin-top:10px;
}
button{
display:block;
width:250px;
padding:14px;
margin-top:15px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}
.signup{
background:#2a6fd6;
color:white;
}
.login{
background:#1fa26a;
color:white;
}

.right{
width:50%;
position:relative;
}

.right img{
width:100%;
border-radius:10px;
mask-image: linear-gradient(to left, rgb(255, 252, 252) 70%, transparent);
-webkit-mask-image: linear-gradient(to left, black 70%, transparent);
}
</style>

<body>

<header>
<h2>SMART CAMPUS SOLUTION</h2>
<p>Building a smarter campus for a better tomorrow</p>
</header>

<section class="hero">

<div class="left">

<h1>Welcome to <span>Smart Campus Solution</span></h1>

<p>
A one-stop platform for Complaint Management and Lost & Found System
to make campus life easier, safer and smarter.
</p>

<button class="signup" onclick="window.location.href='signup.html'">Create New Account</button>
<button class="login" onclick="window.location.href='login.html'">Login to Existing Account</button>

</div>

<div class="right">
<img src="welcome_img.jpg" >
</div>

</section>
</body>
</html>
