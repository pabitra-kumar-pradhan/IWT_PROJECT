<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - Smart Campus</title>
<style>
body{
font-family: Arial, sans-serif;
background: linear-gradient(120deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}
.container{
background:white;
padding:40px;
border-radius:12px;
text-align:center;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
h1{
margin-bottom:10px;
}
p{
color:gray;
margin-bottom:25px;
}
button{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}
.signup{
background:#4facfe;
color:white;
}
.login{
background:#00c896;
color:white;
}
button:hover{
opacity:0.9;
}
</style>
</head>
<body>
<div class="container">
<h1>Welcome</h1>
<p>Smart Campus System</p>
<button class="signup" onclick="createAccount()">Create New Account</button>
<button class="login" onclick="loginAccount()">Login to Existing Account</button>
</div>
<script>
function createAccount(){
window.location.href="signup.html";
}
function loginAccount(){
window.location.href="login.html";
}
</script>
</body>
</html>
